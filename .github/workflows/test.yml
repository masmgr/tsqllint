name: Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore source/TSQLLint.sln --verbosity m

      - name: Build solution
        run: dotnet build source/TSQLLint.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: dotnet test source/TSQLLint.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --settings source/coverlet.runsettings --results-directory ./coverage

      - name: Generate coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          COVERAGE_FILE=$(find ./coverage -name coverage.opencover.xml | head -1)
          if [ -n "$COVERAGE_FILE" ]; then
            reportgenerator -reports:"$COVERAGE_FILE" -targetdir:"./coverage/report" -reporttypes:"Html;HtmlSummary"
          else
            echo "Warning: No coverage file found"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report/
          retention-days: 30
